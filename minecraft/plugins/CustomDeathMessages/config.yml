# Включить сообщения об обновлениях: включает уведомления
enable-update-messages: true

# Для использования HEX-цветов используйте формат &#hex
# PvP сообщения: отправляет сообщение убийце и жертве, когда одного игрока убивает другой.
enable-pvp-messages: true
killer-message: '&eВы убили &c%victim%'
victim-message: '&eВас убил &c%killer%'

# Молния: эффект удара молнии в месте смерти.
enable-lightning: false

# Шанс выпадения головы: число от 0 до 1 (0 = 0%, 0.5 = 50%, 1 = 100%)
drop-head-percentage: 0
head-name: '&cГолова игрока %victim%'

# Задержка сообщений: задержка в секундах между сообщениями о смерти. 0 — выключить.
message-cooldown: 0

# Включить глобальные сообщения: включает сообщения о смерти в общий чат
enable-global-messages: true

# Оригинал при наведении: показывать оригинальное сообщение о смерти при наведении на кастомное.
enable-original-on-hover: false

# Предмет при наведении: показывать предмет, которым был убит игрок, при наведении на имя предмета.
enable-item-on-hover: true

