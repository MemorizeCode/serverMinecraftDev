services:
  minecraft:
    image: dockerhub.timeweb.cloud/itzg/minecraft-server:latest
    container_name: mc-server
    cpuset: "0,1"
    environment:
      EULA: "TRUE"
      TYPE: "CUSTOM"
      CUSTOM_SERVER: "purpur.jar"
      VERSION: "1.21.11"
      SEED: "6984095279909267270"
      MEMORY: "9728M"           
      INIT_MEMORY: "9728M"
      JVM_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8m -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1"
      JVM_DD_OPTS: "add-modules=jdk.incubator.vector"
    ports:
      - "25565:25565"          
      - "24454:24454/udp"
    volumes:
      - ./minecraft:/data
    restart: unless-stopped
    depends_on:
      - mc-db

  mc-db:
    image: dockerhub.timeweb.cloud/library/postgres:16-alpine
    container_name: mc-db
    cpuset: "0,1"
    ports:
      - "127.0.0.1:5432:5432" 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 128M
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
